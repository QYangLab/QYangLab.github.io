<style>
:root {
  color-scheme: light;
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #0f172a;
  --muted: #475569;
  --line: #cbd5e1;
  --accent: #2563eb;
  --accent-soft: #dbeafe;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); line-height: 1.55; }
.shell { display: grid; grid-template-columns: 310px minmax(0, 1fr); min-height: 100vh; }
aside { border-right: 1px solid var(--line); background: var(--card); padding: 20px; position: sticky; top: 0; height: 100vh; overflow: auto; }
main { min-width: 0; padding: 20px; }
h1 { font-size: 20px; margin: 0 0 8px; }
p { color: var(--muted); margin: 0 0 12px; }
.summary { background: #f8fafc; border: 1px solid var(--line); border-radius: 16px; padding: 12px; margin: 14px 0; font-size: 13px; color: var(--muted); }
.demo-list { display: grid; gap: 8px; margin-top: 14px; }
.demo-button { width: 100%; text-align: left; border: 1px solid var(--line); background: #fff; color: var(--text); border-radius: 14px; padding: 10px 12px; cursor: pointer; transition: all .15s; }
.demo-button:hover { background: #f1f5f9; }
.demo-button.active { background: var(--accent-soft); border-color: var(--accent); color: #1d4ed8; font-weight: 700; }
.demo-button .file { display: block; font-size: 11px; color: var(--muted); font-weight: 400; margin-top: 2px; word-break: break-all; }
.toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between; margin-bottom: 14px; background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 14px 16px; box-shadow: 0 10px 30px rgba(15,23,42,.05); }
.toolbar-title { font-weight: 700; }
.toolbar-file { font-size: 12px; color: var(--muted); }
.actions { display: flex; flex-wrap: wrap; gap: 8px; }
button.action { border: 1px solid var(--line); background: #fff; border-radius: 999px; padding: 8px 13px; cursor: pointer; }
button.action.primary { background: var(--accent); border-color: var(--accent); color: white; }
.frame-wrap { background: var(--card); border: 1px solid var(--line); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(15,23,42,.05); }
iframe { display: block; width: 100%; height: calc(100vh - 118px); min-height: 720px; border: 0; background: white; }
.note { font-size: 12px; color: var(--muted); margin-top: 12px; }
@media (max-width: 900px) {
  .shell { grid-template-columns: 1fr; }
  aside { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--line); }
  iframe { height: 80vh; min-height: 620px; }
}
</style>

<script>
const demos = JSON.parse(document.getElementById('demo-data').textContent);
let currentIndex = 0;
const list = document.getElementById('demo-list');
const frame = document.getElementById('demo-frame');
const currentTitle = document.getElementById('current-title');
const currentFile = document.getElementById('current-file');

function b64ToUtf8(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}



const liteMathCss = `
<style id="lite-math-style">
.math-lite{font-family:"Times New Roman","STIX Two Text","Cambria Math",serif;color:#0f172a;font-size:1.04em;white-space:nowrap}
.math-lite.display{display:block;white-space:normal;text-align:center;background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:10px 12px;margin:10px 0;overflow-x:auto}
.math-lite sub{font-size:.72em;vertical-align:-.25em}.math-lite sup{font-size:.72em}.math-lite .frac{display:inline-grid;grid-template-rows:auto auto;text-align:center;vertical-align:middle;margin:0 .18em}.math-lite .frac .num{border-bottom:1px solid currentColor;padding:0 .22em .08em}.math-lite .frac .den{padding:.08em .22em 0}.math-lite .sqrt{border-top:1px solid currentColor;padding-left:.1em}.math-lite .op{font-family:"Times New Roman",serif}.math-lite .kw{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;font-size:.9em}
</style>`;

function latexToHtml(src) {
  let s = src.trim();
  const esc = x => x.replace(/[&<>]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[ch]));
  function convertFrac(t) {
    return t.replace(/\\(?:dfrac|frac)\{([^{}]*)\}\{([^{}]*)\}/g, (_, a, b) => `<span class="frac"><span class="num">${latexToHtml(a)}</span><span class="den">${latexToHtml(b)}</span></span>`);
  }
  s = esc(s);
  s = convertFrac(s);
  const map = [
    [/\\qquad/g,'  '],[/\\quad/g,' '],[/\\;/g,' '],[/\\,/g,' '],[/\\!/g,''],[/\\\|/g,'‖'],[/\\bigl/g,''],[/\\bigr/g,''],[/\\Bigl/g,''],[/\\Bigr/g,''],
    [/\\leftarrow/g,'←'],[/\\rightarrow/g,'→'],[/\\Rightarrow/g,'⇒'],[/\\to/g,'→'],
    [/\\leq/g,'≤'],[/\\geq/g,'≥'],[/\\neq/g,'≠'],[/\\times/g,'×'],[/\\cdot/g,'·'],[/\\odot/g,'⊙'],
    [/\\mid/g,'|'],[/\\neg/g,'¬'],[/\\setminus/g,'∖'],[/\\in/g,'∈'],[/\\notin/g,'∉'],[/\\propto/g,'∝'],[/\\approx/g,'≈'],[/\\sim/g,'∼'],[/\\left/g,''],[/\\right/g,''],[/\\\{/g,'{'],[/\\\}/g,'}'],[/\\pm/g,'±'],[/\\ldots/g,'…'],[/\\cdots/g,'⋯'],
    [/\\alpha/g,'α'],[/\\beta/g,'β'],[/\\gamma/g,'γ'],[/\\Gamma/g,'Γ'],[/\\theta/g,'θ'],[/\\Theta/g,'Θ'],[/\\mu/g,'μ'],[/\\sigma/g,'σ'],[/\\Sigma/g,'Σ'],[/\\pi/g,'π'],[/\\rho/g,'ρ'],[/\\lambda/g,'λ'],[/\\Lambda/g,'Λ'],[/\\Delta/g,'Δ'],[/\\epsilon/g,'ε'],[/\\varepsilon/g,'ε'],
    [/\\mathcal\{N\}/g,'��'],[/\\mathcal\s*\{?L\}?/g,'��'],[/\\mathcal\s*\{?N\}?/g,'��'],[/\\mathbb\s*\{?E\}?/g,'��'],[/\\mathbb\s*\{?H\}?/g,'ℍ'],[/\\mathrm\{Var\}/g,'Var'],[/\\mathrm\{Cov\}/g,'Cov'],[/\\mathrm\{KL\}/g,'KL'],[/\\mathrm\{Beta\}/g,'Beta'],[/\\mathbf\{1\}/g,'1']
  ];
  map.forEach(([r,v]) => { s = s.replace(r,v); });
  s = s.replace(/\\text\{([^{}]*)\}/g,'<span class="kw">$1</span>');
  s = s.replace(/\\mathcal\{([^{}]*)\}/g,'$1');
  s = s.replace(/\\mathbb\{([^{}]*)\}/g,'$1');
  s = s.replace(/\\mathrm\{([^{}]*)\}/g,'<span class="kw">$1</span>');
  s = s.replace(/\\operatorname\{([^{}]*)\}/g,'<span class="kw">$1</span>');
  s = s.replace(/\\exp/g,'exp').replace(/\\log/g,'log').replace(/\\min/g,'min').replace(/\\max/g,'max').replace(/\\tanh/g,'tanh').replace(/\\argmax/g,'argmax').replace(/\\argmin/g,'argmin').replace(/\\partial/g,'∂').replace(/\\sum/g,'∑').replace(/\\prod/g,'∏').replace(/\\int/g,'∫');
  s = s.replace(/\\dot\s*\{([^{}]*)\}/g,'$1̇').replace(/\\dot\s+([A-Za-z])/g,'$1̇');
  s = s.replace(/\\sqrt\{([^{}]*)\}/g,'√<span class="sqrt">$1</span>');
  s = s.replace(/\^\{([^{}]*)\}/g,'<sup>$1</sup>').replace(/_\{([^{}]*)\}/g,'<sub>$1</sub>');
  s = s.replace(/\^([A-Za-z0-9*+\-])/g,'<sup>$1</sup>').replace(/_([A-Za-z0-9*+\-])/g,'<sub>$1</sub>');
  s = s.replace(/\\[a-zA-Z]+/g, m => m.slice(1));
  s = s.replace(/\s+/g,' ');
  return s;
}

function renderLiteMath(root) {
  if (!root || root.__liteMathRendering) return;
  root.__liteMathRendering = true;
  try {
    const doc = root.nodeType === 9 ? root : root.ownerDocument;
    if (doc && doc.head && !doc.getElementById('lite-math-style')) doc.head.insertAdjacentHTML('beforeend', liteMathCss);
    const walker = doc.createTreeWalker(root.body || root, NodeFilter.SHOW_TEXT, {
      acceptNode(node) {
        const parent = node.parentElement;
        if (!parent || !node.nodeValue) return NodeFilter.FILTER_REJECT;
        if (parent.closest('script,style,textarea,pre,code,.math-lite')) return NodeFilter.FILTER_REJECT;
        return /\\\(|\\\[|\$/.test(node.nodeValue) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
      }
    });
    const nodes = [];
    while (walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(node => {
      const text = node.nodeValue;
      const parts = [];
      let i = 0;
      const re = /\\\[([\s\S]*?)\\\]|\\\(([\s\S]*?)\\\)|\$\$([\s\S]*?)\$\$|\$([^$\n]{1,240})\$/g;
      let m;
      while ((m = re.exec(text))) {
        if (m.index > i) parts.push(doc.createTextNode(text.slice(i, m.index)));
        const raw = m[1] ?? m[2] ?? m[3] ?? m[4] ?? '';
        const span = doc.createElement('span');
        span.className = 'math-lite' + ((m[1] || m[3]) ? ' display' : '');
        span.innerHTML = latexToHtml(raw);
        parts.push(span);
        i = m.index + m[0].length;
      }
      if (!parts.length) return;
      if (i < text.length) parts.push(doc.createTextNode(text.slice(i)));
      node.replaceWith(...parts);
    });
  } finally {
    root.__liteMathRendering = false;
  }
}

function installLiteMathFrame() {
  const doc = frame.contentDocument;
  if (!doc) return;
  renderLiteMath(doc);
  if (!doc.__liteMathInstalled) {
    doc.addEventListener('click', function () { setTimeout(() => renderLiteMath(doc), 80); }, true);
    doc.addEventListener('input', function () { setTimeout(() => renderLiteMath(doc), 80); }, true);
    doc.__liteMathInstalled = true;
  }
}

function withLiteMath(html) {
  if (html.includes('renderLiteMath(document)')) return html;
  const support = `${liteMathCss}<script>${latexToHtml.toString()}\n${renderLiteMath.toString()}\nwindow.addEventListener('DOMContentLoaded',function(){renderLiteMath(document);});<\/script>`;
  if (/<\/head>/i.test(html)) return html.replace(/<\/head>/i, `${support}\n</head>`);
  return `${support}\n${html}`;
}

function downloadText(filename, text, type = 'text/plain;charset=utf-8') {
  const blob = new Blob([text], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function renderList() {
  list.innerHTML = demos.map((demo, i) => `
    <button class="demo-button ${i === currentIndex ? 'active' : ''}" data-index="${i}">
      ${i + 1}. ${demo.title}
      <span class="file">${demo.file} · ${Math.round(demo.bytes / 1024)} KB</span>
    </button>
  `).join('');
  list.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => loadDemo(Number(btn.dataset.index)));
  });
}

function loadDemo(index) {
  currentIndex = index;
  const demo = demos[currentIndex];
  currentTitle.textContent = demo.title;
  currentFile.textContent = demo.file;
  frame.srcdoc = b64ToUtf8(demo.b64);
  renderList();
}

document.getElementById('btn-reload').addEventListener('click', () => loadDemo(currentIndex));
document.getElementById('btn-download-current').addEventListener('click', () => {
  const demo = demos[currentIndex];
  downloadText(demo.file, withLiteMath(b64ToUtf8(demo.b64)), 'text/html;charset=utf-8');
});
document.getElementById('btn-download-index').addEventListener('click', () => {
  const index = demos.map(({ b64, ...meta }) => meta);
  downloadText('ch12_demo_index.json', JSON.stringify(index, null, 2), 'application/json;charset=utf-8');
});

frame.addEventListener('load', installLiteMathFrame);
renderList();
loadDemo(0);
</script>
</body>
</html>
