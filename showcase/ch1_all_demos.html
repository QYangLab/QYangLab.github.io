<script>
const demos = JSON.parse(document.getElementById('demo-data').textContent);
let currentIndex = 0;
const list = document.getElementById('demo-list');
const frame = document.getElementById('demo-frame');
const currentTitle = document.getElementById('current-title');
const currentFile = document.getElementById('current-file');

function b64ToUtf8(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}


const liteMathCss = `
<style id="lite-math-style">
.math-lite{font-family:"Times New Roman","STIX Two Text","Cambria Math",serif;color:#0f172a;font-size:1.04em;white-space:nowrap}
.math-lite.display{display:block;white-space:normal;text-align:center;background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:10px 12px;margin:10px 0;overflow-x:auto}
.math-lite sub{font-size:.72em;vertical-align:-.25em}.math-lite sup{font-size:.72em}.math-lite .frac{display:inline-grid;grid-template-rows:auto auto;text-align:center;vertical-align:middle;margin:0 .18em}.math-lite .frac .num{border-bottom:1px solid currentColor;padding:0 .22em .08em}.math-lite .frac .den{padding:.08em .22em 0}.math-lite .sqrt{border-top:1px solid currentColor;padding-left:.1em}.math-lite .op{font-family:"Times New Roman",serif}.math-lite .kw{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;font-size:.9em}
</style>`;

function latexToHtml(src) {
  let s = src.trim();
  const esc = x => x.replace(/[&<>]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[ch]));
  function convertFrac(t) {
    return t.replace(/\\(?:dfrac|frac)\{([^{}]*)\}\{([^{}]*)\}/g, (_, a, b) => `<span class="frac"><span class="num">${latexToHtml(a)}</span><span class="den">${latexToHtml(b)}</span></span>`);
  }
  s = esc(s);
  s = convertFrac(s);
  const map = [
    [/\\qquad/g,'  '],[/\\quad/g,' '],[/\\;/g,' '],[/\\,/g,' '],[/\\!/g,''],[/\\\|/g,'\u2016'],[/\\bigl/g,''],[/\\bigr/g,''],[/\\Bigl/g,''],[/\\Bigr/g,''],
    [/\\leftarrow/g,'\u2190'],[/\\rightarrow/g,'\u2192'],[/\\Rightarrow/g,'\u21d2'],[/\\to/g,'\u2192'],
    [/\\leq/g,'\u2264'],[/\\geq/g,'\u2265'],[/\\neq/g,'\u2260'],[/\\times/g,'\u00d7'],[/\\cdot/g,'\u00b7'],[/\\odot/g,'\u2299'],
    [/\\mid/g,'|'],[/\\neg/g,'\u00ac'],[/\\setminus/g,'\u2216'],[/\\in/g,'\u2208'],[/\\notin/g,'\u2209'],[/\\propto/g,'\u221d'],[/\\approx/g,'\u2248'],[/\\sim/g,'\u223c'],[/\\left/g,''],[/\\right/g,''],[/\\\{/g,'{'],[/\\\}/g,'}'],[/\\pm/g,'\u00b1'],[/\\ldots/g,'\u2026'],[/\\cdots/g,'\u22ef'],
    [/\\alpha/g,'\u03b1'],[/\\beta/g,'\u03b2'],[/\\gamma/g,'\u03b3'],[/\\Gamma/g,'\u0393'],[/\\theta/g,'\u03b8'],[/\\Theta/g,'\u0398'],[/\\mu/g,'\u03bc'],[/\\sigma/g,'\u03c3'],[/\\Sigma/g,'\u03a3'],[/\\pi/g,'\u03c0'],[/\\rho/g,'\u03c1'],[/\\lambda/g,'\u03bb'],[/\\Lambda/g,'\u039b'],[/\\Delta/g,'\u0394'],[/\\epsilon/g,'\u03b5'],[/\\varepsilon/g,'\u03b5'],
    [/\\perp/g,'\u22a5'],
    [/\\mathcal\{N\}/g,'\ud835\udca9'],[/\\mathcal\s*\{?L\}?/g,'\ud835\udcdb'],[/\\mathcal\s*\{?N\}?/g,'\ud835\udca9'],[/\\mathbb\s*\{?E\}?/g,'\ud835\udd3c'],[/\\mathbb\s*\{?H\}?/g,'\u210d'],[/\\mathrm\{Var\}/g,'Var'],[/\\mathrm\{Cov\}/g,'Cov'],[/\\mathrm\{KL\}/g,'KL'],[/\\mathrm\{Beta\}/g,'Beta'],[/\\mathbf\{1\}/g,'1']
  ];
  map.forEach(([r,v]) => { s = s.replace(r,v); });
  s = s.replace(/\\text\{([^{}]*)\}/g,'<span class="kw">$1</span>');
  s = s.replace(/\\mathcal\{([^{}]*)\}/g,'$1');
  s = s.replace(/\\mathbb\{([^{}]*)\}/g,'$1');
  s = s.replace(/\\mathrm\{([^{}]*)\}/g,'<span class="kw">$1</span>');
  s = s.replace(/\\operatorname\{([^{}]*)\}/g,'<span class="kw">$1</span>');
  s = s.replace(/\\exp/g,'exp').replace(/\\log/g,'log').replace(/\\min/g,'min').replace(/\\max/g,'max').replace(/\\tanh/g,'tanh').replace(/\\argmax/g,'argmax').replace(/\\argmin/g,'argmin').replace(/\\partial/g,'\u2202').replace(/\\sum/g,'\u2211').replace(/\\prod/g,'\u220f').replace(/\\int/g,'\u222b');
  s = s.replace(/\\dot\s*\{([^{}]*)\}/g,'$1\u0307').replace(/\\dot\s+([A-Za-z])/g,'$1\u0307');
  s = s.replace(/\\sqrt\{([^{}]*)\}/g,'\u221a<span class="sqrt">$1</span>');
  s = s.replace(/\^\{([^{}]*)\}/g,'<sup>$1</sup>').replace(/_\{([^{}]*)\}/g,'<sub>$1</sub>');
  s = s.replace(/\^([A-Za-z0-9*+\-])/g,'<sup>$1</sup>').replace(/_([A-Za-z0-9*+\-])/g,'<sub>$1</sub>');
  s = s.replace(/\\[a-zA-Z]+/g, m => m.slice(1));
  s = s.replace(/\s+/g,' ');
  return s;
}

function renderLiteMath(root) {
  if (!root || root.__liteMathRendering) return;
  root.__liteMathRendering = true;
  try {
    const doc = root.nodeType === 9 ? root : root.ownerDocument;
    if (doc && doc.head && !doc.getElementById('lite-math-style')) doc.head.insertAdjacentHTML('beforeend', liteMathCss);
    const walker = doc.createTreeWalker(root.body || root, NodeFilter.SHOW_TEXT, {
      acceptNode(node) {
        const parent = node.parentElement;
        if (!parent || !node.nodeValue) return NodeFilter.FILTER_REJECT;
        if (parent.closest('script,style,textarea,pre,code,.math-lite')) return NodeFilter.FILTER_REJECT;
        return /\\\(|\\\[|\$/.test(node.nodeValue) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
      }
    });
    const nodes = [];
    while (walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(node => {
      const text = node.nodeValue;
      const parts = [];
      let i = 0;
      const re = /\\\[([\s\S]*?)\\\]|\\\(([\s\S]*?)\\\)|\$\$([\s\S]*?)\$\$|\$([^$\n]{1,240})\$/g;
      let m;
      while ((m = re.exec(text))) {
        if (m.index > i) parts.push(doc.createTextNode(text.slice(i, m.index)));
        const raw = m[1] ?? m[2] ?? m[3] ?? m[4] ?? '';
        const span = doc.createElement('span');
        span.className = 'math-lite' + ((m[1] || m[3]) ? ' display' : '');
        span.innerHTML = latexToHtml(raw);
        parts.push(span);
        i = m.index + m[0].length;
      }
      if (!parts.length) return;
      if (i < text.length) parts.push(doc.createTextNode(text.slice(i)));
      node.replaceWith(...parts);
    });
  } finally {
    root.__liteMathRendering = false;
  }
}

function installLiteMathFrame() {
  const doc = frame.contentDocument;
  if (!doc) return;
  renderLiteMath(doc);
  if (!doc.__liteMathInstalled) {
    doc.addEventListener('click', function () { setTimeout(() => renderLiteMath(doc), 80); }, true);
    doc.addEventListener('input', function () { setTimeout(() => renderLiteMath(doc), 80); }, true);
    doc.__liteMathInstalled = true;
  }
}

function withLiteMath(html) {
  if (html.includes('renderLiteMath(document)')) return html;
  const support = `${liteMathCss}<script>${latexToHtml.toString()}\n${renderLiteMath.toString()}\nwindow.addEventListener('DOMContentLoaded',function(){renderLiteMath(document);});<\/script>`;
  if (/<\/head>/i.test(html)) return html.replace(/<\/head>/i, `${support}\n</head>`);
  return `${support}\n${html}`;
}

function downloadText(filename, text, type) {
  type = type || 'text/plain;charset=utf-8';
  const blob = new Blob([text], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function renderList() {
  list.innerHTML = demos.map((demo, i) => `
    <button class="demo-button ${i === currentIndex ? 'active' : ''}" data-index="${i}">
      ${i + 1}. ${demo.title}
      <span class="file">${demo.file} \u00b7 ${Math.round(demo.bytes / 1024)} KB</span>
    </button>
  `).join('');
  list.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => loadDemo(Number(btn.dataset.index)));
  });
}

function loadDemo(index) {
  currentIndex = index;
  const demo = demos[currentIndex];
  currentTitle.textContent = demo.title;
  currentFile.textContent = demo.file;
  frame.srcdoc = b64ToUtf8(demo.b64);
  renderList();
}

document.getElementById('btn-reload').addEventListener('click', () => loadDemo(currentIndex));
document.getElementById('btn-download-current').addEventListener('click', () => {
  const demo = demos[currentIndex];
  downloadText(demo.file, withLiteMath(b64ToUtf8(demo.b64)), 'text/html;charset=utf-8');
});
document.getElementById('btn-download-index').addEventListener('click', () => {
  const index = demos.map(({ b64, ...meta }) => meta);
  downloadText('ch1_demo_index.json', JSON.stringify(index, null, 2), 'application/json;charset=utf-8');
});

frame.addEventListener('load', installLiteMathFrame);
renderList();
loadDemo(0);
</script>
