<script>
const liteMathCss = `
<style id="lite-math-style">
.math-lite{font-family:"Times New Roman","STIX Two Text","Cambria Math",serif;color:#0f172a;font-size:1.04em;white-space:nowrap}
.math-lite.display{display:block;white-space:normal;text-align:center;background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:10px 12px;margin:10px 0;overflow-x:auto}
.math-lite sub{font-size:.72em;vertical-align:-.25em}.math-lite sup{font-size:.72em}.math-lite .frac{display:inline-grid;grid-template-rows:auto auto;text-align:center;vertical-align:middle;margin:0 .18em}.math-lite .frac .num{border-bottom:1px solid currentColor;padding:0 .22em .08em}.math-lite .frac .den{padding:.08em .22em 0}.math-lite .sqrt{border-top:1px solid currentColor;padding-left:.1em}.math-lite .op{font-family:"Times New Roman",serif}.math-lite .kw{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;font-size:.9em}
</style>`;

function latexToHtml(src) {
  let s = src.trim();
  const esc = x => x.replace(/[&<>]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[ch]));
  function convertFrac(t) {
    return t.replace(/\\(?:dfrac|frac)\{([^{}]*)\}\{([^{}]*)\}/g, (_, a, b) => `<span class="frac"><span class="num">${latexToHtml(a)}</span><span class="den">${latexToHtml(b)}</span></span>`);
  }
  s = esc(s);
  s = convertFrac(s);
  const map = [
    [/\\qquad/g,'  '],[/\\quad/g,' '],[/\\;/g,' '],[/\\,/g,' '],[/\\!/g,''],[/\\\|/g,'‖'],[/\\bigl/g,''],[/\\bigr/g,''],[/\\Bigl/g,''],[/\\Bigr/g,''],
    [/\\leftarrow/g,'←'],[/\\rightarrow/g,'→'],[/\\Rightarrow/g,'⇒'],[/\\to/g,'→'],
    [/\\leq/g,'≤'],[/\\geq/g,'≥'],[/\\neq/g,'≠'],[/\\times/g,'×'],[/\\cdot/g,'·'],[/\\odot/g,'⊙'],
    [/\\mid/g,'|'],[/\\neg/g,'¬'],[/\\setminus/g,'∖'],[/\\in/g,'∈'],[/\\notin/g,'∉'],[/\\propto/g,'∝'],[/\\approx/g,'≈'],[/\\sim/g,'∼'],[/\\left/g,''],[/\\right/g,''],[/\\\{/g,'{'],[/\\\}/g,'}'],[/\\pm/g,'±'],[/\\ldots/g,'…'],[/\\cdots/g,'⋯'],
    [/\\alpha/g,'α'],[/\\beta/g,'β'],[/\\gamma/g,'γ'],[/\\Gamma/g,'Γ'],[/\\theta/g,'θ'],[/\\Theta/g,'Θ'],[/\\mu/g,'μ'],[/\\sigma/g,'σ'],[/\\Sigma/g,'Σ'],[/\\pi/g,'π'],[/\\rho/g,'ρ'],[/\\lambda/g,'λ'],[/\\Lambda/g,'Λ'],[/\\Delta/g,'Δ'],[/\\epsilon/g,'ε'],[/\\varepsilon/g,'ε'],
    [/\\mathcal\{N\}/g,'𝒩'],[/\\mathcal\s*\{?L\}?/g,'𝓛'],[/\\mathcal\s*\{?N\}?/g,'𝒩'],[/\\mathbb\s*\{?E\}?/g,'𝔼'],[/\\mathbb\s*\{?H\}?/g,'ℍ'],[/\\mathrm\{Var\}/g,'Var'],[/\\mathrm\{Cov\}/g,'Cov'],[/\\mathrm\{KL\}/g,'KL'],[/\\mathrm\{Beta\}/g,'Beta'],[/\\mathbf\{1\}/g,'1']
  ];
  map.forEach(([r,v]) => { s = s.replace(r,v); });
  s = s.replace(/\\text\{([^{}]*)\}/g,'<span class="kw">$1</span>');
  s = s.replace(/\\mathcal\{([^{}]*)\}/g,'$1');
  s = s.replace(/\\mathbb\{([^{}]*)\}/g,'$1');
  s = s.replace(/\\mathrm\{([^{}]*)\}/g,'<span class="kw">$1</span>');
  s = s.replace(/\\operatorname\{([^{}]*)\}/g,'<span class="kw">$1</span>');
  s = s.replace(/\\exp/g,'exp').replace(/\\log/g,'log').replace(/\\min/g,'min').replace(/\\max/g,'max').replace(/\\tanh/g,'tanh').replace(/\\argmax/g,'argmax').replace(/\\argmin/g,'argmin').replace(/\\partial/g,'∂').replace(/\\sum/g,'∑').replace(/\\prod/g,'∏').replace(/\\int/g,'∫');
  s = s.replace(/\\dot\s*\{([^{}]*)\}/g,'$1̇').replace(/\\dot\s+([A-Za-z])/g,'$1̇');
  s = s.replace(/\\sqrt\{([^{}]*)\}/g,'√<span class="sqrt">$1</span>');
  s = s.replace(/\^\{([^{}]*)\}/g,'<sup>$1</sup>').replace(/_\{([^{}]*)\}/g,'<sub>$1</sub>');
  s = s.replace(/\^([A-Za-z0-9*+\-])/g,'<sup>$1</sup>').replace(/_([A-Za-z0-9*+\-])/g,'<sub>$1</sub>');
  s = s.replace(/\\[a-zA-Z]+/g, m => m.slice(1));
  s = s.replace(/\s+/g,' ');
  return s;
}

function renderLiteMath(root) {
  if (!root || root.__liteMathRendering) return;
  root.__liteMathRendering = true;
  try {
    const doc = root.nodeType === 9 ? root : root.ownerDocument;
    if (doc && doc.head && !doc.getElementById('lite-math-style')) doc.head.insertAdjacentHTML('beforeend', liteMathCss);
    const walker = doc.createTreeWalker(root.body || root, NodeFilter.SHOW_TEXT, {
      acceptNode(node) {
        const parent = node.parentElement;
        if (!parent || !node.nodeValue) return NodeFilter.FILTER_REJECT;
        if (parent.closest('script,style,textarea,pre,code,.math-lite')) return NodeFilter.FILTER_REJECT;
        return /\\\(|\\\[|\$/.test(node.nodeValue) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
      }
    });
    const nodes = [];
    while (walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(node => {
      const text = node.nodeValue;
      const parts = [];
      let i = 0;
      const re = /\\\[([\s\S]*?)\\\]|\\\(([\s\S]*?)\\\)|\$\$([\s\S]*?)\$\$|\$([^$\n]{1,240})\$/g;
      let m;
      while ((m = re.exec(text))) {
        if (m.index > i) parts.push(doc.createTextNode(text.slice(i, m.index)));
        const raw = m[1] ?? m[2] ?? m[3] ?? m[4] ?? '';
        const span = doc.createElement('span');
        span.className = 'math-lite' + ((m[1] || m[3]) ? ' display' : '');
        span.innerHTML = latexToHtml(raw);
        parts.push(span);
        i = m.index + m[0].length;
      }
      if (!parts.length) return;
      if (i < text.length) parts.push(doc.createTextNode(text.slice(i)));
      node.replaceWith(...parts);
    });
  } finally {
    root.__liteMathRendering = false;
  }
}
const demos=JSON.parse(document.getElementById('demo-data').textContent);
let cur=0;const frame=document.getElementById('demoFrame');
function b64ToUtf8(b){return decodeURIComponent(escape(atob(b)))}
function loadDemo(i){cur=i;document.querySelectorAll('.demo-button').forEach((b,j)=>b.classList.toggle('active',j===i));document.getElementById('toolbarTitle').textContent=demos[i].title;document.getElementById('toolbarFile').textContent=demos[i].file;frame.srcdoc=b64ToUtf8(demos[i].b64)}
demos.forEach((d,i)=>{const b=document.createElement('button');b.className='demo-button';b.innerHTML=(i+1)+'. '+d.title+'<span class="file">'+d.file+'</span>';b.onclick=()=>loadDemo(i);document.getElementById('demoList').appendChild(b)});
frame.addEventListener('load',()=>{try{renderLiteMath(frame.contentDocument)}catch(e){}});
document.getElementById('reloadBtn').onclick=()=>loadDemo(cur);
function dl(name,text,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:type||'text/html'}));a.download=name;a.click()}
document.getElementById('downloadHtmlBtn').onclick=()=>dl(demos[cur].file,b64ToUtf8(demos[cur].b64));
document.getElementById('downloadJsonBtn').onclick=()=>dl('ch4_demo_manifest.json',JSON.stringify(demos.map(d=>({title:d.title,file:d.file})),null,2),'application/json');
loadDemo(0);
</script></body></html>
